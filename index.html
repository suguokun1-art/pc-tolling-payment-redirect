<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store" />
    <title>Payment Redirect</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #eef4f6;
        color: #0b2430;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        background: #ffffff;
        border: 1px solid #c7d8de;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 18px 45px rgba(12, 47, 60, 0.12);
      }

      .mark {
        width: 46px;
        height: 46px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #0b5c75;
        color: #ffffff;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 18px 0 8px;
        font-size: 24px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: #476775;
        line-height: 1.6;
        font-size: 15px;
      }

      .status {
        margin-top: 20px;
        padding: 14px;
        border-radius: 8px;
        background: #f4f8fa;
        border: 1px solid #d8e5e9;
        color: #163949;
        overflow-wrap: anywhere;
      }

      a,
      button {
        width: 100%;
        min-height: 44px;
        margin-top: 16px;
        border: 0;
        border-radius: 8px;
        background: #0b5c75;
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
        display: none;
        align-items: center;
        justify-content: center;
      }

      a.visible {
        display: flex;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">ETC</div>
      <h1>Payment gateway</h1>
      <p>The payment entry is connecting to the current tolling backend.</p>
      <div id="status" class="status">Loading payment route...</div>
      <a id="manualLink" href="#" rel="noopener">Open payment page</a>
    </main>

    <script>
      (function () {
        var statusEl = document.getElementById("status");
        var manualLink = document.getElementById("manualLink");

        function showError(message) {
          statusEl.textContent = message;
          manualLink.className = "";
          manualLink.removeAttribute("href");
        }

        function openPayment(url) {
          statusEl.textContent = "Opening payment page...";
          manualLink.href = url;
          manualLink.className = "visible";
          window.setTimeout(function () {
            window.location.replace(url);
          }, 350);
        }

        var xhr = new XMLHttpRequest();
        xhr.open("GET", "./current-payment-url.json?v=" + Date.now(), true);
        xhr.setRequestHeader("Cache-Control", "no-cache");
        xhr.onreadystatechange = function () {
          if (xhr.readyState !== 4) {
            return;
          }
          if (xhr.status < 200 || xhr.status >= 300) {
            showError("Payment route is not ready. Please start the tunnel service.");
            return;
          }
          try {
            var data = JSON.parse(xhr.responseText);
            var url = String(data.paymentUrl || "");
            if (!/^https:\/\/[-a-zA-Z0-9.]+\/p(?:[?#].*)?$/.test(url)) {
              showError("Payment route is invalid. Please update the tunnel route.");
              return;
            }
            openPayment(url);
          } catch (err) {
            showError("Payment route is unreadable. Please update the tunnel route.");
          }
        };
        xhr.onerror = function () {
          showError("Payment route is offline. Please check the redirect site.");
        };
        xhr.send(null);
      })();
    </script>
  </body>
</html>
